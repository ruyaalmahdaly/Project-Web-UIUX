<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Duo Green Sheet</title>

    <link rel="stylesheet" href="style.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="LogoNavbar.svg">
    </div>

    <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="article.html">Article</a></li>
        <li><a href="catalog.html">Catalog</a></li>
        <li><a href="#">FAQ</a></li>
    </ul>

    <div class="nav-actions">
        <button class="icon-btn">
            <img src="Icon/Shopping-cart.svg">
        </button>
        <button class="btn-profile active">
            <img src="Icon/UserWhite.svg"> Profile
        </button>
    </div>
</nav>

<!-- PROFILE -->
<main class="profile-page">
    <aside class="sidebar">
        <div class="user-avatar">
            <img src="avatar.svg" alt="User">
            <button class="camera-btn">
            <img src="Camera.svg" alt="User" width="20">
            </button>
        </div>

        <h3>Habibi Ibnu</h3>

        <nav class="profile-nav">
            <a href="profile.html" class="active">
                <span class="icon">
                    <img src="User.svg" alt="Profile">
                </span>
                Profile
            </a>

            <a href="pesanan.html">
                <span class="icon">
                    <img src="Document.svg" alt="Profile">
                </span> 
                Pesanan
            </a>

            <a href="settings.html">
                <span class="icon">
                    <img src="Settings-alt.svg" alt="settings">
                </span> 
                Settings
            </a>
        </nav>

        <button class="logout-btn" onclick="window.location.href='index.html'">
                Log Out
        </button>
    </aside>

    <section class="profile-content">
        <div class="form-card">
            <h2>Profile</h2>

            <div class="form-grid">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" value="Habibi Ibnu">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" value="+62-8765-4321-123">
                </div>

                <div class="input-group full">
                    <label>Email</label>
                    <input type="email" value="habibiibnu@gmail.com">
                </div>

                <div class="input-group full">
                    <label>Password</label>
                    <input type="password" value="********">
                </div>
            </div>

            <button class="btn-edit">Edit Profile</button>
        </div>

        <div class="form-card">
            <h2>Address</h2>
            <textarea rows="3">
Jl. Anggrek No. 12, Kel. Panakkukang, Kec. Panakkukang, Kota Makassar, Sulawesi Selatan 90231
            </textarea>

            <button class="btn-edit">Edit Address</button>
        </div>
    </section>
</main>

</body>
</html>
